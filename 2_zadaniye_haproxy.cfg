global
    log /dev/log    local0
    log /dev/log    local1 notice
    chroot /var/lib/haproxy
    stats socket /run/haproxy/admin.sock mode 660 level admin
    stats timeout 30s
    user haproxy
    group haproxy
    daemon

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    timeout connect 5000
    timeout client  50000
    timeout server  50000

# Frontend - принимает все запросы на порт 80
frontend http_front
    bind *:80
    
    # ACL для проверки домена example.local
    acl is_example_local hdr(host) -i example.local
    
    # Включаем статистику
    stats uri /stats
    
    # Если запрос к example.local - направляем на weighted backend
    use_backend weighted_servers if is_example_local
    
    # Все остальные запросы - на default backend
    default_backend no_balance

# Backend с weighted round-robin для example.local
backend weighted_servers
    balance roundrobin
    server server1 127.0.0.1:8001 weight 2 check
    server server2 127.0.0.1:8002 weight 3 check
    server server3 127.0.0.1:8003 weight 4 check

# Backend для запросов НЕ к example.local (возвращает ошибку)
backend no_balance
    mode http
    http-request deny deny_status 403
